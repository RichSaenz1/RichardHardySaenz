  The Future Studio - Shared Funnel Header (partial)
  File: /assets/funnel/header.html

  How to apply (Phase C):

     (see /assets/funnel/README.md for the snippet).
  2. Add class="tfs-shell tfs-has-shell" to the page <body>.
  3. Paste the markup below as the FIRST element inside <body>.
  4. Include /assets/funnel/lang-toggle.js, urgency-bar.js, and

  Bilingual rules
  - data-en / data-es attributes carry the English / Spanish copy.
  - lang-toggle.js swaps textContent (or href on data-wa-link) when
    the user clicks an EN / ES button.
  - Spanish strings here use ASCII-only Latin for cross-encoding
    safety (matches the convention in the main landing page).
  - Default visible text is English (so JS-disabled users still
    see the site in English).

  Stripe / payment safety

  - The only outbound link is the "Book Demo" calendly URL,
    which already exists on the main landing page and is NOT a
