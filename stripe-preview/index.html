<!doctype html>
<html lang="en">
<head>
<meta name="twitter:card" content="summary_large_image">
<meta name="robots" content="noindex,follow">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stripe Checkout Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #050505;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }
    main {
      min-height: 100vh;
      padding: 28px;
    }
    .top {
      max-width: 1440px;
      margin: 0 auto 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid rgba(255,255,255,.16);
      padding-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 64px);
      line-height: .9;
      text-transform: uppercase;
      font-style: italic;
      font-weight: 1000;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 14px 22px;
      background: linear-gradient(90deg, #12d8cb, #55a8ff, #925cff);
      color: #050505;
      text-decoration: none;
      font-size: 13px;
      font-weight: 1000;
      letter-spacing: .14em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .frame {
      max-width: 1440px;
      margin: 0 auto;
      background: #fff;
      border: 2px solid rgba(255,255,255,.3);
    }
    img {
      display: block;
      width: 100%;
      height: auto;
    }
    @media (max-width: 700px) {
      main { padding: 14px; }
      .top { align-items: stretch; flex-direction: column; }
      a { width: 100%; }
    }
  </style>
  <link rel="canonical" href="https://thefuturestudio.online/stripe-preview/">
  <meta property="og:title" content="Stripe Checkout Preview">
  <meta property="og:description" content="">
  <meta property="og:url" content="https://thefuturestudio.online/stripe-preview/">
  <meta property="og:type" content="article">
</head>
<body>
  <main>
    <div class="top">
      <h1>Stripe Checkout Preview</h1>
      <a href="https://buy.stripe.com/fZu9ATa1Y1YudMV8oMaR20E">Open Live Checkout</a>
    </div>
    <div class="frame">
      <img src="/stripe-checkout-starter-preview-loaded.png" alt="Starter Package Stripe checkout preview">
    </div>
  </main>
</body>
</html>
