<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Headline Font Previews - Set 3</title>
    <style>
      body { margin: 0; background: #f5f7f9; color: #0d2b45; font-family: Inter, system-ui, sans-serif; }
      main { display: grid; gap: 24px; margin: 0 auto; max-width: 1200px; padding: 32px; }
      h1 { margin: 0; font-size: 28px; }
      .intro { margin: -10px 0 8px; color: #2c4a5e; line-height: 1.6; }
      figure { margin: 0; overflow: hidden; border: 1px solid #e0eef7; border-radius: 18px; background: #fff; box-shadow: 0 18px 54px rgba(13,43,69,.08); }
      figcaption { padding: 14px 18px; font-weight: 700; display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: baseline; }
      small { color: #2c4a5e; font-weight: 500; }
      img { display: block; width: 100%; height: auto; border-top: 1px solid #e0eef7; }
    </style>
  </head>
  <body>
    <main>
      <h1>Headline Font Previews - Set 3</h1>
      <p class="intro">Modern status/service direction: private clinic, international care, premium digital concierge.</p>
      <figure><figcaption>01 Manrope<small>Private-clinic modern, clean and quietly premium.</small></figcaption><img src="./01-manrope.png" /></figure>
      <figure><figcaption>02 Plus Jakarta Sans<small>World-class service, polished, contemporary.</small></figcaption><img src="./02-plus-jakarta-sans.png" /></figure>
      <figure><figcaption>03 Instrument Sans<small>Refined brand-system sans, very controlled.</small></figcaption><img src="./03-instrument-sans.png" /></figure>
      <figure><figcaption>04 Geist<small>Minimal, premium digital-product feel.</small></figcaption><img src="./04-geist.png" /></figure>
      <figure><figcaption>05 Sora<small>Precise, international, high-tech medical.</small></figcaption><img src="./05-sora.png" /></figure>
      <figure><figcaption>06 Outfit<small>Geometric, clean, upscale but approachable.</small></figcaption><img src="./06-outfit.png" /></figure>
      <figure><figcaption>07 Urbanist<small>Architecture/luxury-service energy, elegant sans.</small></figcaption><img src="./07-urbanist.png" /></figure>
      <figure><figcaption>08 Albert Sans<small>Neutral, European, calm authority.</small></figcaption><img src="./08-albert-sans.png" /></figure>
      <figure><figcaption>09 Schibsted Grotesk<small>Editorial sans with credibility and restraint.</small></figcaption><img src="./09-schibsted-grotesk.png" /></figure>
      <figure><figcaption>10 Space Grotesk<small>Modern specialist/technology signal.</small></figcaption><img src="./10-space-grotesk.png" /></figure>
    </main>
  </body>
</html>
