<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Headline Font Previews</title>
    <style>
      body {
        margin: 0;
        background: #f5f7f9;
        color: #0d2b45;
        font-family: Inter, system-ui, sans-serif;
      }

      main {
        display: grid;
        gap: 24px;
        margin: 0 auto;
        max-width: 1200px;
        padding: 32px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      figure {
        margin: 0;
        overflow: hidden;
        border: 1px solid #e0eef7;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 18px 54px rgba(13, 43, 69, 0.08);
      }

      figcaption {
        padding: 14px 18px;
        font-weight: 700;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border-top: 1px solid #e0eef7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Headline Font Previews</h1>
      <figure><figcaption>01 Playfair Display</figcaption><img src="./01-playfair-display.png" /></figure>
      <figure><figcaption>02 Libre Baskerville</figcaption><img src="./02-libre-baskerville.png" /></figure>
      <figure><figcaption>03 Fraunces</figcaption><img src="./03-fraunces.png" /></figure>
      <figure><figcaption>04 Marcellus</figcaption><img src="./04-marcellus.png" /></figure>
      <figure><figcaption>05 DM Serif Display</figcaption><img src="./05-dm-serif-display.png" /></figure>
      <figure><figcaption>06 Prata</figcaption><img src="./06-prata.png" /></figure>
      <figure><figcaption>07 Spectral</figcaption><img src="./07-spectral.png" /></figure>
      <figure><figcaption>08 Crimson Pro</figcaption><img src="./08-crimson-pro.png" /></figure>
      <figure><figcaption>09 EB Garamond</figcaption><img src="./09-eb-garamond.png" /></figure>
      <figure><figcaption>10 Source Serif 4</figcaption><img src="./10-source-serif-4.png" /></figure>
    </main>
  </body>
</html>
