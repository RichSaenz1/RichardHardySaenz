<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Headline Font Previews - Set 2</title>
    <style>
      body { margin: 0; background: #f5f7f9; color: #0d2b45; font-family: Inter, system-ui, sans-serif; }
      main { display: grid; gap: 24px; margin: 0 auto; max-width: 1200px; padding: 32px; }
      h1 { margin: 0; font-size: 28px; }
      .intro { margin: -10px 0 8px; color: #2c4a5e; line-height: 1.6; }
      figure { margin: 0; overflow: hidden; border: 1px solid #e0eef7; border-radius: 18px; background: #fff; box-shadow: 0 18px 54px rgba(13,43,69,.08); }
      figcaption { padding: 14px 18px; font-weight: 700; display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: baseline; }
      small { color: #2c4a5e; font-weight: 500; }
      img { display: block; width: 100%; height: auto; border-top: 1px solid #e0eef7; }
    </style>
  </head>
  <body>
    <main>
      <h1>Headline Font Previews - Set 2</h1>
      <p class="intro">More restrained, healthcare/editorial options tested on the current homepage. These are previews only.</p>
      <figure><figcaption>01 Noto Serif Display<small>Editorial, legible, broad language support.</small></figcaption><img src="./01-noto-serif-display.png" /></figure>
      <figure><figcaption>02 Roboto Serif<small>Modern medical, serious, screen-optimized.</small></figcaption><img src="./02-roboto-serif.png" /></figure>
      <figure><figcaption>03 Lora<small>Warm, readable, professional.</small></figcaption><img src="./03-lora.png" /></figure>
      <figure><figcaption>04 Merriweather<small>Trustworthy and sturdy for healthcare.</small></figcaption><img src="./04-merriweather.png" /></figure>
      <figure><figcaption>05 Literata<small>Bookish, calm, expert-led.</small></figcaption><img src="./05-literata.png" /></figure>
      <figure><figcaption>06 Alegreya<small>Humanist, refined, less fashion-like.</small></figcaption><img src="./06-alegreya.png" /></figure>
      <figure><figcaption>07 Brygada 1918<small>Classic with personality but still formal.</small></figcaption><img src="./07-brygada-1918.png" /></figure>
      <figure><figcaption>08 Petrona<small>Soft editorial, good Spanish readability.</small></figcaption><img src="./08-petrona.png" /></figure>
      <figure><figcaption>09 Vollkorn<small>Robust, less delicate, authoritative.</small></figcaption><img src="./09-vollkorn.png" /></figure>
      <figure><figcaption>10 Instrument Serif<small>Premium but lighter; more boutique/editorial.</small></figcaption><img src="./10-instrument-serif.png" /></figure>
    </main>
  </body>
</html>
